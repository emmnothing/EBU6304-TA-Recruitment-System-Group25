<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TA Recruitment System - Login</title>
  <style>
    :root {
      --primary: #5b8db8;
      --primary-dark: #3f6f98;
      --bg: #f4f7fa;
      --panel: #ffffff;
      --text: #2f3b46;
      --muted: #7b8a97;
      --border: #d6dee6;
      --shadow: 0 12px 30px rgba(39, 62, 85, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #eef3f8 0%, #f8fafc 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Decorative background */
    body::before,
    body::after {
      content: "";
      position: absolute;
      width: 320px;
      height: 320px;
      background: rgba(91, 141, 184, 0.15);
      border-radius: 50%;
      z-index: 0;
    }

    body::before { top: -80px; left: -80px; }
    body::after { bottom: -100px; right: -100px; }

    .title {
      font-size: 36px;
      font-weight: 900;
      margin-bottom: 24px;
      color: var(--primary);
      text-align: center;
      letter-spacing: 1px;
      text-shadow: 0 4px 12px rgba(91,141,184,0.25);
      z-index: 1;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 36px 30px;
      box-shadow: var(--shadow);
      z-index: 1;
    }

    .login-card h2 {
      font-size: 26px;
      margin-bottom: 8px;
      text-align: center;
    }

    .sub {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 24px;
      text-align: center;
    }

    .field { margin-bottom: 16px; }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: bold;
    }

    .field input,
    .field select {
      width: 100%;
      height: 44px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 12px;
      outline: none;
      transition: 0.2s;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(91,141,184,0.15);
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .link {
      color: var(--primary);
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
    }

    .link:hover {
      text-decoration: underline;
      color: var(--primary-dark);
    }

    .btn {
      width: 100%;
      height: 46px;
      background: linear-gradient(135deg, #5b8db8, #3f6f98);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(91,141,184,0.3);
    }

    .footer {
      text-align: center;
      margin-top: 18px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="title">TA Recruitment System</div>

  <div class="login-card">
    <h2>Login</h2>
    <p class="sub">Please enter your account details</p>

    <form>
      <div class="field">
        <label>Username</label>
        <input type="text" placeholder="Enter username">
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" placeholder="Enter password">
      </div>

      <div class="field">
        <label>User Type</label>
        <select>
          <option>TA Applicant</option>
          <option>Module Organiser</option>
          <option>Administrator</option>
        </select>
      </div>

      <div class="row">
        <span><input type="checkbox"> Remember</span>
        <a href="forgot.html" class="link">Forgot?</a>
      </div>

      <button class="btn">Login</button>
    </form>

    <div class="footer">
      No account? <a href="register.html" class="link">Register here</a>
    </div>
  </div>

</body>
</html>
